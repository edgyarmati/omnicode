name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without v prefix (e.g. 0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-release-assets:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            build_set: linux
            artifact_name: omnicode-release-linux
          - runner: macos-14
            build_set: darwin
            artifact_name: omnicode-release-darwin
          - runner: windows-latest
            build_set: windows
            artifact_name: omnicode-release-windows

    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build release archives
        env:
          OMNICODE_VERSION: ${{ github.event.inputs.version || github.ref_name }}
          BUILD_SET: ${{ matrix.build_set }}
        shell: bash
        run: |
          if [[ "$OMNICODE_VERSION" == v* ]]; then
            export OMNICODE_VERSION="${OMNICODE_VERSION#v}"
          fi
          bash ./scripts/release/build-binaries.sh

      - name: Upload release assets artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/omnicode-*

  publish-release:
    needs: build-release-assets
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: omnicode-release-*
          merge-multiple: true
          path: dist

      - name: Generate SHA256SUMS
        shell: bash
        run: |
          cd dist
          shasum -a 256 omnicode-* > SHA256SUMS

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref_name, 'v') && github.ref_name || format('v{0}', github.event.inputs.version) }}
          files: |
            dist/omnicode-*
            dist/SHA256SUMS
          generate_release_notes: true
          draft: false
          prerelease: false
